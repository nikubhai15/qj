[phases.setup]
nixPkgs = [
  "python312",
  "python312Packages.venv",
  "chromium"
]

[phases.install]
cmds = [
  "python -m venv .venv",
  ". .venv/bin/activate && python -m pip install -r requirements.txt",
  ". .venv/bin/activate && python -m playwright install chromium"
]

[start]
cmd = ". .venv/bin/activate && python app.py"
